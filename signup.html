<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FTCIntel - Înregistrare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast-wrapper"></div>
    <div class="container">
        <div class="logo-container">
            <img src="https://i.ibb.co/czB55HG/logo.png" class="main-logo" alt="FTCIntel">
        </div>

        <div class="card">
            <h2 style="margin-bottom: 20px; text-align: center; font-size: 18px;">Creează Cont Nou</h2>
            
            <div style="margin-bottom:15px">
                <label>Număr Echipă</label>
                <input type="number" id="team-id" placeholder="Ex: 19121">
            </div>

            <div style="margin-bottom:20px">
                <label>Email Contact</label>
                <input type="email" id="email-id" placeholder="echipa@gmail.com">
            </div>

            <button onclick="handleSignup()" id="btn-signup" class="btn-primary">SOLICITĂ ACCES</button>
            
            <p style="text-align: center; margin-top: 25px; font-size: 14px; color: var(--text-dim);">
                Ai deja cont? <a href="login.html" style="color: var(--accent-color); text-decoration: none; font-weight: bold;">Autentifică-te</a>
            </p>
        </div>

        <p style="text-align: center; font-size: 11px; color: var(--text-dim); margin-top: 20px;">
            Prin înregistrare, ești de acord cu <a href="tos.html" style="color: var(--text-dim);">TOS</a>.
        </p>
    </div>

    <script src="config.js"></script>
    <script>
        function showToast(msg, type='error') {
            const w = document.getElementById('toast-wrapper');
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.innerHTML = `<span>${type==='success'?'✅':'⚠️'}</span><span>${msg}</span>`;
            w.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        async function handleSignup() {
            const team = document.getElementById('team-id').value;
            const email = document.getElementById('email-id').value;
            const btn = document.getElementById('btn-signup');

            if(!team || !email) return showToast("Completează toate datele.");

            btn.disabled = true; btn.innerText = "SE PROCESEAZĂ...";

            try {
                const r = await fetch(`${SCRIPT_URL}?action=signup&team=${encodeURIComponent(team)}&email=${encodeURIComponent(email)}`);
                const data = await r.json();

                if(data.success) {
                    showToast("Succes! Verifică email-ul pentru Token.", "success");
                    setTimeout(() => window.location.href = "login.html", 4000);
                } else {
                    showToast(data.msg || "Eroare la înregistrare.");
                    btn.disabled = false; btn.innerText = "SOLICITĂ ACCES";
                }
            } catch(e) {
                showToast("Eroare de conexiune.");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
