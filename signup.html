<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FTCIntel - Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast-wrapper"></div>
    <div class="container">
        <div class="logo-container">
            <img src="https://i.ibb.co/sJtbvLzP/logo-x2.png" class="main-logo" alt="FTCIntel">
        </div>

        <div class="card">
            <h2 style="text-align:center; margin-bottom:25px; font-size:22px; letter-spacing: 1px;">REGISTER TEAM</h2>
            
            <div style="margin-bottom:20px">
                <label>Team Number</label>
                <input type="number" id="team-id" placeholder="e.g. 19121">
            </div>

            <div style="margin-bottom:30px">
                <label>Contact Email</label>
                <input type="email" id="email-id" placeholder="team@gmail.com">
            </div>

            <button onclick="handleSignup()" id="btn-signup" class="btn-primary">REQUEST ACCESS</button>
            
            <p style="text-align: center; margin-top: 30px; font-size: 14px; color: var(--text-dim);">
                Already have a token? <a href="login.html" style="color: var(--accent); font-weight: bold; text-decoration:none">Login</a>
            </p>
        </div>
    </div>

    <div class="footer-separator"></div>
    <div class="footer-link-container">
        <a href="tos.html">ToS & Contact</a>
    </div>

    <script src="config.js"></script>
    <script>
        function showToast(msg) {
            const w = document.getElementById('toast-wrapper');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = msg;
            w.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }

        async function handleSignup() {
            const team = document.getElementById('team-id').value;
            const email = document.getElementById('email-id').value;
            const btn = document.getElementById('btn-signup');

            if(!team || !email) return showToast("Please fill all fields.");

            btn.disabled = true; btn.innerText = "SENDING...";

            try {
                const r = await fetch(`${SCRIPT_URL}?action=signup&team=${encodeURIComponent(team)}&email=${encodeURIComponent(email)}`);
                const data = await r.json();

                if(data.success) {
                    showToast("Success! Check your email for the token.");
                    setTimeout(() => window.location.href = "login.html", 3500);
                } else {
                    showToast(data.msg || "Registration failed.");
                    btn.disabled = false; btn.innerText = "REQUEST ACCESS";
                }
            } catch(e) {
                showToast("Connection error.");
                btn.disabled = false;
                btn.innerText = "REQUEST ACCESS";
            }
        }
    </script>
</body>
</html>
