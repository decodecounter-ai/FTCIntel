<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTCIntel - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="toast-wrapper"></div>
    <div class="container">
        <div class="logo-container">
            <img src="https://i.ibb.co/czB55HG/logo.png" class="main-logo" alt="FTCIntel">
        </div>

        <div style="display:flex; gap:8px; margin-bottom:20px;">
            <button class="btn-primary" onclick="showTab('scout')" style="margin:0; flex:1">SCOUT</button>
            <button class="btn-primary" onclick="showTab('intel')" style="margin:0; flex:1; background:var(--card-bg); border:1px solid var(--border)">INTEL</button>
            <button class="btn-primary" onclick="showTab('db'); fetchDatabase()" style="margin:0; flex:1; background:var(--card-bg); border:1px solid var(--border)">DATA</button>
        </div>

        <div id="tab-scout">
            <div class="card">
                <label>Match Info</label>
                <div style="display:flex; gap:10px">
                    <input type="number" id="target-team" placeholder="Team #">
                    <input type="number" id="match-id" placeholder="Match #">
                </div>
            </div>

            <div class="card">
                <label>Alliance & Location</label>
                <select id="auto-type">
                    <option value="rap">Red Alliance - AP</option>
                    <option value="rdep">Red Alliance - DEP</option>
                    <option value="aap">Blue Alliance - AP</option>
                    <option value="adep">Blue Alliance - DEP</option>
                </select>
            </div>

            <div class="card">
                <div class="scouting-section">
                    <label>Auto Scored (X)</label>
                    <div class="counter-group">
                        <button class="btn-step btn-minus" onclick="adj('auto-scored', -1)">-</button>
                        <div class="count-display" id="auto-scored">0</div>
                        <button class="btn-step btn-plus" onclick="adj('auto-scored', 1)">+</button>
                    </div>
                </div>

                <div class="scouting-section" style="margin-top:20px">
                    <label>Auto Missed (Y)</label>
                    <div class="counter-group">
                        <button class="btn-step btn-minus" onclick="adj('auto-missed', -1)">-</button>
                        <div class="count-display" id="auto-missed">0</div>
                        <button class="btn-step btn-plus" onclick="adj('auto-missed', 1)">+</button>
                    </div>
                </div>

                <div class="scouting-section" style="margin-top:20px">
                    <label>Teleop Score</label>
                    <div class="counter-group">
                        <button class="btn-step btn-minus" onclick="adj('tele-score', -1)">-</button>
                        <div class="count-display" id="tele-score">0</div>
                        <button class="btn-step btn-plus" onclick="adj('tele-score', 1)">+</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <label>Ranking Points (RP)</label>
                <input type="number" id="rp-input" placeholder="Enter RP" value="0">
            </div>

            <button class="btn-primary" id="btn-save" onclick="sendUplink()">SAVE MATCH</button>
        </div>

        <div id="tab-intel" style="display:none">... (Same as before) ...</div>
        <div id="tab-db" style="display:none"><div class="table-scroll" id="db-content"></div></div>
    </div>

    <div class="footer-separator"></div>
    <div class="footer-link-container">
        <a href="tos.html">ToS & Contact</a>
    </div>

    <script src="config.js"></script>
    <script>
        let teleHistory = [];

        function showTab(id) {
            ['scout', 'intel', 'db'].forEach(t => document.getElementById('tab-'+t).style.display = 'none');
            document.getElementById('tab-'+id).style.display = 'block';
        }

        function adj(id, val) {
            const el = document.getElementById(id);
            let current = parseInt(el.innerText);
            let next = Math.max(0, current + val);
            el.innerText = next;
            
            // For Teleop, we keep history for the uplink
            if(id === 'tele-score') {
                if(val === 1) teleHistory.push(next);
                else if(val === -1) teleHistory.pop();
            }
        }

        async function sendUplink() {
            const btn = document.getElementById('btn-save');
            const x = document.getElementById('auto-scored').innerText;
            const y = document.getElementById('auto-missed').innerText;
            
            const p = new URLSearchParams({
                action: 'uplink',
                myTeam: sessionStorage.getItem('team'),
                myToken: sessionStorage.getItem('token'),
                target: document.getElementById('target-team').value,
                match: document.getElementById('match-id').value,
                auto_type: document.getElementById('auto-type').value,
                auto_val: `${x}(${parseInt(x) + parseInt(y)})`, // Format: X(X+Y)
                tele: teleHistory.join(','),
                rp: document.getElementById('rp-input').value
            });

            btn.disabled = true; btn.innerText = "SAVING...";
            try {
                const r = await fetch(`${SCRIPT_URL}?${p}`);
                const j = await r.json();
                if(j.success) {
                    alert("Data Saved!");
                    location.reload();
                }
            } catch(e) { alert("Error."); }
            finally { btn.disabled = false; btn.innerText = "SAVE MATCH"; }
        }
    </script>
</body>
</html>
