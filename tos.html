<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTCIntel — TOS & Contact</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .tos-wrap { width: 100%; max-width: 500px; }

        .brand-block { text-align: center; margin-bottom: 28px; }
        .brand-block .logo { font-family: 'Rajdhani', sans-serif; font-size: 30px; font-weight: 700; color: var(--white); letter-spacing: 3px; }
        .brand-block .logo span { color: var(--purple-hi); }

        .tos-card {
            background: var(--card);
            padding: 36px 28px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 64px rgba(0,0,0,0.65);
            position: relative;
            overflow: hidden;
            text-align: center;
            color: var(--text-dim);
        }
        .tos-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--purple), var(--purple-hi), var(--purple), transparent);
        }
        .tos-card h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--purple-hi);
            letter-spacing: 2px;
            margin-bottom: 24px;
            text-transform: uppercase;
        }
        .text-box {
            background: var(--bg2);
            padding: 28px 20px;
            border-radius: 10px;
            border: 1px dashed var(--border2);
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-style: italic;
            font-size: 14px;
            color: var(--text-mute);
            font-family: 'JetBrains Mono', monospace;
        }
        .back-btn {
            margin-top: 28px;
            display: inline-block;
            color: var(--purple-hi);
            text-decoration: none;
            font-size: 13px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color 0.2s;
        }
        .back-btn:hover { color: var(--accent2); }
    </style>
</head>
<body>
    <div class="tos-wrap">
        <div class="brand-block">
            <div class="logo">FTC<span>Intel</span></div>
        </div>
        <div class="tos-card">
            <h1>Terms of Service & Contact</h1>
            <div class="text-box">
                Coming soon....
            </div>
            <a href="javascript:history.back()" class="back-btn">← Înapoi</a>
        </div>
    </div>
</body>
</html>
