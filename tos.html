<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTCIntel — TOS & Contact</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .tos-wrap { width: 100%; max-width: 480px; }

        .brand-block { text-align: center; margin-bottom: 28px; }
        .brand-title { font-size: 20px; font-weight: 700; color: var(--white); }
        .brand-title span { color: var(--purple-light); }

        .tos-card {
            background: var(--card);
            padding: 32px 28px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
            text-align: center;
        }
        .tos-card h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 20px;
        }
        .text-box {
            background: var(--bg2);
            padding: 28px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-style: italic;
            font-size: 14px;
            color: var(--text-dim);
        }
        .back-btn {
            margin-top: 24px;
            display: inline-block;
            color: var(--purple-light);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.15s;
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg2);
        }
        .back-btn:hover { color: var(--white); border-color: var(--purple-light); background: var(--bg3); }
    </style>
</head>
<body>
    <div class="tos-wrap">
        <div class="brand-block">
            <div class="brand-title">FTC<span>Intel</span></div>
        </div>
        <div class="tos-card">
            <h1>Terms of Service & Contact</h1>
            <div class="text-box">Coming soon....</div>
            <a href="javascript:history.back()" class="back-btn">← Înapoi</a>
        </div>
    </div>
</body>
</html>
