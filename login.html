<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTCIntel — Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-wrap { width: 100%; max-width: 380px; }

        .brand-block { text-align: center; margin-bottom: 32px; }
        .brand-block .logo { font-family: 'Rajdhani', sans-serif; font-size: 36px; font-weight: 700; color: var(--white); letter-spacing: 3px; }
        .brand-block .logo span { color: var(--purple-hi); }
        .brand-block .sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 2px; margin-top: 4px; }

        .login-card {
            background: var(--card);
            padding: 36px 28px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 64px rgba(0,0,0,0.65);
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--purple), var(--purple-hi), var(--purple), transparent);
        }
        .login-card h2 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            letter-spacing: 2.5px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 24px;
            text-align: center;
        }
        .field-label {
            display: block;
            font-size: 9px;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .field-wrap { margin-bottom: 16px; }
        .field-wrap input {
            width: 100%;
            background: var(--bg2);
            border: 1px solid var(--border2);
            color: var(--white);
            padding: 13px 16px;
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field-wrap input:focus {
            outline: none;
            border-color: var(--purple-hi);
            box-shadow: 0 0 0 3px rgba(107,53,255,0.15);
        }
        .btn-login {
            width: 100%;
            margin-top: 8px;
            padding: 15px;
            background: linear-gradient(135deg, var(--purple) 0%, var(--purple-hi) 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 20px rgba(75,15,224,0.35);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, transparent 100%);
            pointer-events: none;
        }
        .btn-login:hover    { transform: translateY(-1px); box-shadow: 0 6px 26px rgba(107,53,255,0.45); }
        .btn-login:active   { transform: translateY(0); }
        .btn-login:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
        .signup-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-dim); }
        .signup-link a { color: var(--purple-hi); text-decoration: none; font-weight: 600; }
        .signup-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="brand-block">
            <div class="logo">FTC<span>Intel</span></div>
            <div class="sub">RO2D2 SCOUTING NETWORK</div>
        </div>
        <div class="login-card">
            <h2>Sign In</h2>
            <div class="field-wrap">
                <label class="field-label">Team Number</label>
                <input type="number" id="team-id" placeholder="Team Number">
            </div>
            <div class="field-wrap">
                <label class="field-label">Access Token</label>
                <input type="text" id="token-id" placeholder="Access Token">
            </div>
            <button onclick="handleLogin()" id="btn-login" class="btn-login">Login</button>
            <div class="signup-link">
                New team? <a href="signup.html">Sign up here</a>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        async function handleLogin() {
            const id = document.getElementById('team-id').value;
            const tk = document.getElementById('token-id').value;
            const btn = document.getElementById('btn-login');

            if(!id || !tk) return alert("Please fill both fields.");

            btn.innerText = "Verifying...";
            btn.disabled = true;

            const url = `${SCRIPT_URL}?action=login&teamId=${id}&token=${tk}`;
            console.log("Trimitere cerere Login către:", url);

            try {
                const response = await fetch(url);
                const data = await response.json();
                console.log("Răspuns primit:", data);

                if(data.success) {
                    sessionStorage.setItem('team', id);
                    sessionStorage.setItem('token', tk);
                    window.location.href = "dashboard.html";
                } else {
                    alert("Invalid team or token.");
                }
            } catch(e) {
                console.error("EROARE LA LOGIN:", e);
                alert("Login Error! Verifică consola (F12).");
            } finally {
                btn.innerText = "Login";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
